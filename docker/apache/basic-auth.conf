SetEnvIf Request_URI "^/api/health$" noauth=1
SetEnvIf Request_URI "^/assets/" noauth=1
SetEnvIf Request_URI "^/icons/" noauth=1
SetEnvIf Request_URI "^/sw\.js$" noauth=1
SetEnvIf Request_URI "^/manifest\.webmanifest$" noauth=1

<Location "/">
    AuthType Basic
    AuthName "Restricted"
    AuthBasicProvider file
    AuthUserFile /etc/apache2/.htpasswd

    <RequireAny>
        Require env noauth
        Require valid-user
    </RequireAny>
</Location>
