services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: con-app:latest
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${PROD_APP_SECRET:?set PROD_APP_SECRET in .env.prod}
      DEFAULT_URI: ${PROD_DEFAULT_URI:?set PROD_DEFAULT_URI in .env.prod}
      DB_HOST: ${PROD_DB_HOST:?set PROD_DB_HOST in .env.prod}
      DB_PORT: ${PROD_DB_PORT:-3306}
      DB_NAME: ${PROD_DB_NAME:?set PROD_DB_NAME in .env.prod}
      DB_USER: ${PROD_DB_USER:?set PROD_DB_USER in .env.prod}
      DB_PASSWORD: ${PROD_DB_PASSWORD:?set PROD_DB_PASSWORD in .env.prod}
      DB_CHARSET: ${PROD_DB_CHARSET:-utf8mb4}
      FRONTEND_RADIO_SYNC_DEFAULT_URL: ${PROD_FRONTEND_RADIO_SYNC_DEFAULT_URL:-https://example.com/radio-json.php}
      FRONTEND_RADIO_SYNC_DEFAULT_POLL_INTERVAL_SECONDS: ${PROD_FRONTEND_RADIO_SYNC_DEFAULT_POLL_INTERVAL_SECONDS:-2}
      BASIC_AUTH_USERNAME: ${PROD_BASIC_AUTH_USERNAME:-}
      BASIC_AUTH_PASSWORD: ${PROD_BASIC_AUTH_PASSWORD:-}
    ports:
      - "${PROD_APP_PORT:-8080}:80"
