<VirtualHost *:80>
    ServerName log.example.com

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "log.example.com"

    <Location "/">
        AuthType Basic
        AuthName "Restricted"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
    </Location>

    <Location "/assets/">
        Require all granted
        Satisfy any
    </Location>

    <Location "/icons/">
        Require all granted
        Satisfy any
    </Location>

    <Location "/sw.js">
        Require all granted
        Satisfy any
    </Location>

    <Location "/manifest.webmanifest">
        Require all granted
        Satisfy any
    </Location>

    <Location "/api/health">
        Require all granted
        Satisfy any
    </Location>

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set X-Frame-Options "DENY"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; manifest-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'"
</VirtualHost>
