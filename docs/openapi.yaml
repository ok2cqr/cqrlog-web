openapi: 3.0.3
info:
  title: CQRLOG REST API
  version: 0.1.0
  description: |
    REST API over the legacy CQRLOG MariaDB schema.
    The contract is resource-oriented and does not expose raw legacy column names.
servers:
  - url: http://localhost:4000
tags:
  - name: Health
  - name: CallsignContext
  - name: DXCC
  - name: Profiles
  - name: Notes
  - name: LongNotes
  - name: LogEntries
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/callsignContext:
    get:
      tags: [CallsignContext]
      summary: Get callsign helper context
      operationId: getCallsignContext
      parameters:
        - name: callsign
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 20
        - name: qsoDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Callsign context response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallsignContext'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/dxcc:
    get:
      tags: [DXCC]
      summary: Resolve DXCC metadata for a callsign
      operationId: getDxcc
      parameters:
        - name: callsign
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 20
      responses:
        '200':
          description: DXCC lookup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dxcc'
        '422':
          $ref: '#/components/responses/ValidationError'
        '502':
          $ref: '#/components/responses/UpstreamError'
  /api/profiles:
    get:
      tags: [Profiles]
      summary: List profiles
      operationId: listProfiles
      responses:
        '200':
          description: Profile collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileCollection'
    post:
      tags: [Profiles]
      summary: Create profile
      operationId: createProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileCreateRequest'
      responses:
        '201':
          description: Created profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/profiles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Profiles]
      summary: Get profile detail
      operationId: getProfile
      responses:
        '200':
          description: Profile detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Profiles]
      summary: Update profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/notes:
    get:
      tags: [Notes]
      summary: List notes
      operationId: listNotes
      responses:
        '200':
          description: Note collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteCollection'
    post:
      tags: [Notes]
      summary: Create note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteCreateRequest'
      responses:
        '201':
          description: Created note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/notes/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Notes]
      summary: Get note detail
      operationId: getNote
      responses:
        '200':
          description: Note detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Notes]
      summary: Update note
      operationId: updateNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteUpdateRequest'
      responses:
        '200':
          description: Updated note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/longNotes:
    get:
      tags: [LongNotes]
      summary: List long notes
      operationId: listLongNotes
      responses:
        '200':
          description: Long note collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LongNoteCollection'
    post:
      tags: [LongNotes]
      summary: Create long note
      operationId: createLongNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LongNoteCreateRequest'
      responses:
        '201':
          description: Created long note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LongNote'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/longNotes/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [LongNotes]
      summary: Get long note detail
      operationId: getLongNote
      responses:
        '200':
          description: Long note detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LongNote'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [LongNotes]
      summary: Update long note
      operationId: updateLongNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LongNoteUpdateRequest'
      responses:
        '200':
          description: Updated long note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LongNote'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/logEntries:
    get:
      tags: [LogEntries]
      summary: List log entries
      operationId: listLogEntries
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: perPage
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: callsign
          in: query
          required: false
          schema:
            type: string
            maxLength: 20
          description: Case-insensitive partial match.
        - name: qsoDateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: qsoDateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [qsoDate, callsign, frequency, mode, id]
            default: qsoDate
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Log entry collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEntryCollection'
    post:
      tags: [LogEntries]
      summary: Create log entry
      operationId: createLogEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogEntryCreateRequest'
      responses:
        '201':
          description: Created log entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEntry'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/logEntries/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [LogEntries]
      summary: Get log entry detail
      operationId: getLogEntry
      responses:
        '200':
          description: Log entry detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEntry'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [LogEntries]
      summary: Update log entry
      operationId: updateLogEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogEntryUpdateRequest'
      responses:
        '200':
          description: Updated log entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEntry'
        '400':
          $ref: '#/components/responses/InvalidJson'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    InvalidJson:
      description: Invalid JSON request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamError:
      description: Upstream lookup failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required: [status, environment]
      properties:
        status:
          type: string
          example: ok
        environment:
          type: string
          example: dev
    CallsignNote:
      type: object
      required: [id, remarks]
      properties:
        id:
          type: integer
        remarks:
          type: string
          nullable: true
          maxLength: 256
    ClubMembership:
      type: object
      required: [slot, name, number, fromDate, toDate]
      properties:
        slot:
          type: integer
          minimum: 1
          maximum: 5
        name:
          type: string
        number:
          type: string
        fromDate:
          type: string
          nullable: true
          format: date
        toDate:
          type: string
          nullable: true
          format: date
    CallsignContext:
      type: object
      required: [callsign, idCall, note, clubs, recentQsoCount, recentQsos, autofill]
      properties:
        callsign:
          type: string
          maxLength: 20
        idCall:
          type: string
          maxLength: 20
        note:
          allOf:
            - $ref: '#/components/schemas/CallsignNote'
          nullable: true
        clubs:
          type: array
          items:
            $ref: '#/components/schemas/ClubMembership'
        recentQsoCount:
          type: integer
          minimum: 0
        recentQsos:
          type: array
          items:
            $ref: '#/components/schemas/RecentQso'
        autofill:
          $ref: '#/components/schemas/CallsignAutofill'
    Dxcc:
      type: object
      required: [callsign, name, details, continent, utc, waz, itu, lat, lng, adif]
      properties:
        callsign:
          type: string
        name:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
        continent:
          type: string
          nullable: true
        utc:
          type: string
          nullable: true
        waz:
          type: integer
          nullable: true
        itu:
          type: integer
          nullable: true
        lat:
          type: string
          nullable: true
        lng:
          type: string
          nullable: true
        adif:
          type: integer
          nullable: true
    RecentQso:
      type: object
      required: [id, qsoDate, timeOn, timeOff, callsign, band, mode]
      properties:
        id:
          type: integer
        qsoDate:
          type: string
          format: date
        timeOn:
          type: string
        timeOff:
          type: string
          nullable: true
        callsign:
          type: string
        band:
          type: string
          nullable: true
        mode:
          type: string
    CallsignAutofill:
      type: object
      required: [name, qth, award, qslVia, state, county, waz, itu, grid]
      properties:
        name:
          type: string
          nullable: true
        qth:
          type: string
          nullable: true
        award:
          type: string
          nullable: true
        qslVia:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        county:
          type: string
          nullable: true
        waz:
          type: integer
          nullable: true
        itu:
          type: integer
          nullable: true
        grid:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_failed
            message:
              type: string
              example: Request validation failed.
            details:
              type: object
              additionalProperties: true
    Profile:
      type: object
      required: [id, number, locator, qth, rig, remarks, visible]
      properties:
        id:
          type: integer
        number:
          type: integer
          minimum: 1
        locator:
          type: string
          nullable: true
          maxLength: 6
        qth:
          type: string
          nullable: true
          maxLength: 250
        rig:
          type: string
          nullable: true
          maxLength: 250
        remarks:
          type: string
          nullable: true
          maxLength: 250
        visible:
          type: boolean
    ProfileCreateRequest:
      type: object
      required: [number]
      additionalProperties: false
      properties:
        number:
          type: integer
          minimum: 1
        locator:
          type: string
          nullable: true
          maxLength: 6
        qth:
          type: string
          nullable: true
          maxLength: 250
        rig:
          type: string
          nullable: true
          maxLength: 250
        remarks:
          type: string
          nullable: true
          maxLength: 250
        visible:
          type: boolean
    ProfileUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        number:
          type: integer
          minimum: 1
        locator:
          type: string
          nullable: true
          maxLength: 6
        qth:
          type: string
          nullable: true
          maxLength: 250
        rig:
          type: string
          nullable: true
          maxLength: 250
        remarks:
          type: string
          nullable: true
          maxLength: 250
        visible:
          type: boolean
    ProfileCollection:
      type: object
      required: [items, totalCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
        totalCount:
          type: integer
    Note:
      type: object
      required: [id, callsign, remarks]
      properties:
        id:
          type: integer
        callsign:
          type: string
          nullable: true
          maxLength: 20
        remarks:
          type: string
          nullable: true
          maxLength: 256
    NoteCreateRequest:
      type: object
      required: [callsign]
      additionalProperties: false
      properties:
        callsign:
          type: string
          minLength: 1
          maxLength: 20
        remarks:
          type: string
          nullable: true
          maxLength: 256
    NoteUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        callsign:
          type: string
          minLength: 1
          maxLength: 20
        remarks:
          type: string
          nullable: true
          maxLength: 256
    NoteCollection:
      type: object
      required: [items, totalCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Note'
        totalCount:
          type: integer
    LongNote:
      type: object
      required: [id, note]
      properties:
        id:
          type: integer
        note:
          type: string
          nullable: true
    LongNoteCreateRequest:
      type: object
      required: [note]
      additionalProperties: false
      properties:
        note:
          type: string
          minLength: 1
    LongNoteUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        note:
          type: string
          nullable: true
    LongNoteCollection:
      type: object
      required: [items, totalCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LongNote'
        totalCount:
          type: integer
    LogEntry:
      type: object
      required:
        - id
        - qsoDate
        - timeOn
        - timeOff
        - callsign
        - frequency
        - mode
        - rstSent
        - rstReceived
        - name
        - qth
        - band
        - remarks
        - qslSent
        - qslReceived
        - qslVia
        - iota
        - power
        - itu
        - waz
        - idCall
        - lotwSentDate
        - lotwReceivedDate
        - lotwSent
        - lotwReceived
        - continent
        - qslSentDate
        - qslReceivedDate
        - clubNumber1
        - clubNumber2
        - clubNumber3
        - clubNumber4
        - clubNumber5
        - eqslSent
        - eqslSentDate
        - eqslReceived
        - eqslReceivedDate
        - receiveFrequency
        - satellite
        - propagationMode
        - stx
        - srx
        - stxString
        - srxString
        - contestName
        - myLocator
        - qsoDxcc
        - profileId
      properties:
        id:
          type: integer
        qsoDate:
          type: string
          format: date
        timeOn:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
        timeOff:
          type: string
          nullable: true
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
        callsign:
          type: string
          maxLength: 20
        frequency:
          type: number
          format: double
          exclusiveMinimum: 0
        mode:
          type: string
          maxLength: 12
        rstSent:
          type: string
          nullable: true
          maxLength: 20
        rstReceived:
          type: string
          nullable: true
          maxLength: 20
        name:
          type: string
          nullable: true
          maxLength: 40
        qth:
          type: string
          nullable: true
          maxLength: 60
        grid:
          type: string
          nullable: true
          maxLength: 10
        state:
          type: string
          nullable: true
          maxLength: 4
        county:
          type: string
          nullable: true
          maxLength: 30
        award:
          type: string
          nullable: true
          maxLength: 50
        adif:
          type: integer
          nullable: true
          minimum: 0
        band:
          type: string
          nullable: true
          maxLength: 6
        remarks:
          type: string
          nullable: true
          maxLength: 200
        qslSent:
          type: string
          nullable: true
          maxLength: 4
        qslReceived:
          type: string
          nullable: true
          maxLength: 3
        qslVia:
          type: string
          nullable: true
          maxLength: 30
        iota:
          type: string
          nullable: true
          maxLength: 6
        power:
          type: string
          nullable: true
          maxLength: 10
        itu:
          type: integer
          nullable: true
          minimum: 0
        waz:
          type: integer
          nullable: true
          minimum: 0
        idCall:
          type: string
          nullable: true
          maxLength: 20
        lotwSentDate:
          type: string
          nullable: true
          format: date
        lotwReceivedDate:
          type: string
          nullable: true
          format: date
        lotwSent:
          type: string
          nullable: true
          maxLength: 3
        lotwReceived:
          type: string
          nullable: true
          maxLength: 3
        continent:
          type: string
          nullable: true
          maxLength: 3
        qslSentDate:
          type: string
          nullable: true
          maxLength: 10
        qslReceivedDate:
          type: string
          nullable: true
          maxLength: 10
        clubNumber1:
          type: string
          nullable: true
          maxLength: 100
        clubNumber2:
          type: string
          nullable: true
          maxLength: 100
        clubNumber3:
          type: string
          nullable: true
          maxLength: 100
        clubNumber4:
          type: string
          nullable: true
          maxLength: 100
        clubNumber5:
          type: string
          nullable: true
          maxLength: 100
        eqslSent:
          type: string
          nullable: true
          maxLength: 1
        eqslSentDate:
          type: string
          nullable: true
          format: date
        eqslReceived:
          type: string
          nullable: true
          maxLength: 1
        eqslReceivedDate:
          type: string
          nullable: true
          format: date
        receiveFrequency:
          type: number
          format: double
          nullable: true
          exclusiveMinimum: 0
        satellite:
          type: string
          nullable: true
          maxLength: 30
        propagationMode:
          type: string
          nullable: true
          maxLength: 30
        stx:
          type: string
          nullable: true
          maxLength: 6
        srx:
          type: string
          nullable: true
          maxLength: 6
        stxString:
          type: string
          nullable: true
          maxLength: 50
        srxString:
          type: string
          nullable: true
          maxLength: 50
        contestName:
          type: string
          nullable: true
          maxLength: 40
        dok:
          type: string
          nullable: true
          maxLength: 12
        operator:
          type: string
          nullable: true
          maxLength: 20
        myLocator:
          type: string
          nullable: true
          maxLength: 10
        qsoDxcc:
          type: integer
          nullable: true
          minimum: 0
        profileId:
          type: integer
          nullable: true
          minimum: 0
    LogEntryCreateRequest:
      type: object
      required: [qsoDate, timeOn, callsign, frequency, mode]
      additionalProperties: false
      properties:
        qsoDate:
          type: string
          format: date
        timeOn:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
        timeOff:
          type: string
          nullable: true
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
        callsign:
          type: string
          minLength: 1
          maxLength: 20
        frequency:
          type: number
          format: double
          exclusiveMinimum: 0
        mode:
          type: string
          minLength: 1
          maxLength: 12
        rstSent:
          type: string
          nullable: true
          maxLength: 20
        rstReceived:
          type: string
          nullable: true
          maxLength: 20
        name:
          type: string
          nullable: true
          maxLength: 40
        qth:
          type: string
          nullable: true
          maxLength: 60
        grid:
          type: string
          nullable: true
          maxLength: 10
        state:
          type: string
          nullable: true
          maxLength: 4
        county:
          type: string
          nullable: true
          maxLength: 30
        award:
          type: string
          nullable: true
          maxLength: 50
        adif:
          type: integer
          nullable: true
          minimum: 0
        band:
          type: string
          nullable: true
          maxLength: 6
        remarks:
          type: string
          nullable: true
          maxLength: 200
